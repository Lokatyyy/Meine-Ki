services:
  - type: web
    name: meine-ki
    env: python
    plan: free
    pythonVersion: 3.11.9
    buildCommand: >
      pip install --upgrade pip setuptools wheel &&
      pip install -r requirements.txt
    startCommand: >
      gunicorn --workers 1 --threads 2 --worker-class gthread
      --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHONUNBUFFERED
        value: true
